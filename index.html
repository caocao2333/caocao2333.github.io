<!DOCTYPE html>
<html>
    <head>
        <style>
            :root {
                --lighting-size: 500px;
                --lighting-color: #9333ea;
                --lighting-highlight-color: #d8b4fe;
            }
            html {
                height: 100%;
                width: 100%;
                color-scheme: light dark;
            }
            header {
                position: fixed;
                width: 80%;
                height: 10px;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.6);
            }
            body {
                --x: 0px;
                --y: 0px;
                font-family: helvetica; 
                width: 100%;
                height: 100%;
                max-height: 100%;
                position: relative; 
                padding: 40px; 
                box-sizing: border-box; 
                overflow: hidden;
                font-family: Arial, sans-serif;
                background-color: transparent;
                margin: 0;
                padding: 0;
            }
            body::after {
                content: '';
                position: absolute;
                top: -100%;
                right: -100%;
                bottom: -100%;
                left: -100%;
                background: conic-gradient(from 180deg at 50% 50%, #12001b -97.5deg, #000 14.5deg, #040eff 54.01deg, #8000ff 113.42deg, #00b6b6 185.62deg, #1a1a1a 262.5deg, #000 374.05deg);
                z-index: -1;
                filter: blur(300px) brightness(1.5);
                animation: 60s move linear infinite;
            }

            .dark-theme {
                background-color: #333;
                border-top-left-radius: 10px;
                border-top-right-radius: 10px;
                padding: 10px;
                display: flex;
                align-items: center;
            }
            .main_container {
                background-color: transparent;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100%;
                width: 100%;
                flex-direction: column
            }
            .title {
                margin-left: 10px;
            }

            .title h3 {
                margin: 0;
                font-size: 16px;
            }

            .logo {
                margin-right: auto;
            }
            .logo a {
                font-size: 30px;
                letter-spacing: -3;
                font-weight: bold;
                text-decoration: none;
                color: #ffffff;
            }
            .nav_list {
                list-style: none;
            }
            .nav_list li {
                display: inline-block;
                padding: 0px 20px;
            }
            .nav_list li a {
                transition: all 0.3s ease 0s;
            }
            .nav_list li a:hover {
                color: #00b6b6;
            }
            .hero_pane {
                background-color: rgba(0, 0, 0, 0.6);
                font-family: Helvetica;
                width: 50%;
                max-width: 50%;
                max-height: 100%;
                position: relative;
                border-radius: 40px;
                padding: 40px;
                display: flex;
                align-items: center;
            }
            .hyper {
                margin: 0;
                padding: 0;
                font-size: 55px;
                letter-spacing: -1;
                font-weight: bold;
                text-decoration: none;
                color: #9333ea;
                display: inline-block;
                background-image: radial-gradient(var(--lighting-highlight-color), var(--lighting-color), var(--lighting-color));
                background-size: var(--lighting-size) var(--lighting-size);
                background-repeat: no-repeat;
                background-position-x: calc(var(--x) - var(--positionX) - calc(var(--lighting-size) / 2));
                background-position-y: calc(var(--y) - var(--positionY) - calc(var(--lighting-size) / 2));
                background-color: var(--lighting-color);
                color: transparent;
                -webkit-background-clip: text;
                background-clip: text;
            }
            h1 {
                margin: 0;
                padding: 0;
                font-size: 25px;
                font-weight: 1;
            }
            h2 {
                margin: 0;
                padding: 0;
                font-size: 60px;
                letter-spacing: -1;
                
            }
            span {
                font-size: 50px;
                font-weight: normal;
                display: block;
            }
            li, a, button {
                font-family: "Helvetica", sans-serif;
                font-weight: 500;
                font-size: 16px;
                color: #edf0f1;
                text-decoration: none;
            }
            button {
                width: 100px;
                height: 50px;
                margin-left: 20px;
                color: #fff;
                background: #222;
                position: relative;
                cursor: pointer;
                z-index: 1;
                border-radius: 10px;
                border: none;
            }
            button::before {
                content: '';
                width: 108px;
                height: 58px;
                top: -4px;
                left: -4px;
                color: #fff;
                background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple, red);
                filter: blur(5px);
                background-size: 1000%;
                animation: amSize 40s linear infinite;
                position: absolute;
                border-radius: 10px;
                transition: all .35s;
                z-index: -1;
                border: none;
                opacity: 0;
            }
            button::after {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background: #222;
                border-radius: 10px;
                z-index: -1;
                opacity: 1;
            }
            button:hover::before {
                opacity: 1;
            }
            header {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                padding: 30px 10%;
            }

            @keyframes move {
                from {
                    transform: rotate(180deg);
                }
                to {
                    transform: rotate(540deg);
                }
            }
            @keyframes amSize {
                0% {
                    background-position: 0 0;
                }
                100% {
                    background-position: 1000% 0;
                }
            }
        </style>
    </head>
    <body>
        <div style="width: 100%; height: 100%; background-color: #ffffff; display: flex; justify-content: center; align-items: center;">
            <h1 style="color: #000;">Work in Progress</h1>
        </div>
        <div class="main_container">
            <header>
                <h1 class="logo"><a class="logo" href="caocao2333.github.io">Jerry Wang</a></h1>
                <nav>
                    <ul class="nav_list">
                        <li><a href="#">About</a></li>
                        <li><a href="#">Projects</a></li>
                    </ul>
                </nav>
                <a class="cta" href="#"><button>Contact</button></a>
            </header>
            <div class="hero_pane">
                <div style="max-width: 40%; margin-left: 2%;">
                    <h2>Placeholder</h2>
                    <h1>More Placeholder</h1>
                    <a class="hyper" href="#">I will get to this</a>
                </div>
            </div>

            <script>
                document.querySelector('body').addEventListener('mousemove', (e) => {
                    e.currentTarget.style.setProperty('--x', `${e.clientX}px`);
                    e.currentTarget.style.setProperty('--y', `${e.clientY}px`);
                });

                function setLinkPosition() {
                    document.querySelectorAll('a').forEach((a) => {
                        const bounding = a.getBoundingClientRect();

                        a.style.setProperty('--positionX', `${bounding.x}px`);
                        a.style.setProperty('--positionY', `${bounding.y}px`);
                    });
                }

                window.addEventListener('load', setLinkPosition);
                window.addEventListener('resize', setLinkPosition);
            </script>
        </div>
    </body>
</html>
